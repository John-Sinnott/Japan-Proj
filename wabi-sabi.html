<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WABI-SABI</title>

  <script src="https://cdn.tailwindcss.com"></script>


  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
      user-select: none;
    }
  </style>
</head>
<body class="bg-[linear-gradient(to_right,_#ffffff_0%,_#FFEFBA_50%,_#ffffff_100%)] text-black h-screen relative select-none">

  <!-- Kanji -->
  <h1 class="text-8xl font-semibold absolute top-32 left-1/2 -translate-x-1/2">
    侘寂
  </h1>

  <!-- Wabi-Sabi (angled) -->
  <p class="text-6xl font-600 opacity-60 absolute top-[55%] left-[25%] rotate-[-15deg]">
    Wabi-Sabi
  </p>

  <!-- Definition (angled other direction) -->
  <p class="max-w-xs text-lg leading-relaxed opacity-75 absolute top-[55%] right-[20%] rotate-[12deg]">
    Wabi-Sabi is a way of seeing the beauty in imperfection — finding harmony in what is simple, different and mysterious.
  </p>

</body>
</html>
